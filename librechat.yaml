# ============================================================================
# librechat.yaml  —  Custom configuration for [Your Organization]
# ----------------------------------------------------------------------------
# HOW THIS IS USED ON RENDER
#   1. Host this file at a raw URL (e.g. a GitHub gist "Raw" link).
#   2. In Render, set the env var:   CONFIG_PATH=https://.../librechat.yaml
#   3. LibreChat fetches it at startup. After ANY edit, RESTART the LibreChat
#      service in Render — changes are not picked up live.
#
# SECRETS RULE
#   This file may be hosted at a public URL, so it must contain NO secrets.
#   Use ${ENV_VAR} placeholders; put the real values in Render env vars.
#
# VALIDATION
#   LibreChat fail-fast validates this file and will EXIT on a bad key/value.
#   After the first restart, check the service logs. If it complains about a
#   specific key, remove or fix that key and restart again.
# ============================================================================

# Config schema version. Bump only if current LibreChat docs specify a newer one.
version: 1.2.8

# Cache parsed config in memory.
cache: true

# ----------------------------------------------------------------------------
# INTERFACE / BRANDING  (the no-fork branding for your demo)
# ----------------------------------------------------------------------------
# NOTE: the app NAME (title bar + login screen) is set via the APP_TITLE env
# var in Render — e.g. APP_TITLE="Acme Insights" — not in this file.
interface:
  # Greeting shown on a new chat. Plain text.
  customWelcome: "Welcome to Impacting Tomorrow — ask a question about our data to get started."

  # Footer under the message box. Replaces LibreChat's default footer links.
  # Markdown links allowed, pipe-separated: "[Privacy](url) | [Contact](url)".
  # (You can also set this via the CUSTOM_FOOTER env var instead.)
  customFooter: "Impacting Tomorrow · Powered by Catalyst"

  # Help/FAQ link in the UI. By default this points at LibreChat's docs —
  # set it to your own page (or your org's help email/site) to remove that.
  # helpAndFAQURL: "https://your-organization.org/help"

  # Your own privacy policy / terms, so no LibreChat-default links show.
  # privacyPolicy:
  #   externalUrl: "https://impactingtomorrow.com/terms-of-service/"
  #   openNewTab: true
  termsOfService:
    externalUrl: "https://impactingtomorrow.com/terms-of-service/"
    openNewTab: true
    # Optional: force a one-time acceptance modal on first login.
    # modalAcceptance: true
    # modalTitle: "Terms of Service for Impacting Tomorrow"
    # modalContent: "Your terms text here."

  # Standard UI toggles — sensible defaults for a clean demo.
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: false

  # Who can USE / CREATE / SHARE MCP servers from the UI.
  # For a demo: users may USE the admin-defined Catalyst server below,
  # but cannot create or share their own.
  mcpServers:
    USE: true
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

# ----------------------------------------------------------------------------
# MCP SERVERS  (Catalyst, with per-user OAuth)
# ----------------------------------------------------------------------------
mcpServers:
  catalyst:
    # Transport Catalyst serves: streamable-http | sse. Set it to match exactly.
    type: streamable-http

    # The Catalyst MCP endpoint. Real value lives in a Render env var.
    url: ${CATALYST_MCP_URL}

    chatMenu: true
    serverInstructions: true

    # Per-user auth: do NOT open a shared connection at app startup. Each user
    # authenticates individually from the MCP settings panel. Keep this false
    # so Catalyst enforces per-user permissions (one shared connection would
    # defeat that).
    startup: false

    # Declare OAuth EXPLICITLY. Without this, LibreChat tries to auto-detect
    # OAuth by probing Catalyst at startup — and that probe failing is the
    # usual cause of "won't connect / errors at startup". Setting this skips
    # the flaky detection.
    requiresOAuth: true

    # Optional custom icon (a URL works).
    # iconPath: "https://your-host.com/catalyst-icon.png"

    # --- OAuth -----------------------------------------------------------------
    # Provide the endpoints directly so LibreChat doesn't depend on OAuth
    # discovery. Get the authorization/token URLs + a registered client from
    # whoever runs Catalyst. Keep client_id/secret in Render env vars.
    # NOTE: the field is `scope` (singular), not `scopes`.
    oauth:
      authorization_url: "https://catalyst.impactingtomorrow.com/oauth/authorize"   # from Catalyst
      token_url: "https://catalyst.impactingtomorrow.com/oauth/token"               # from Catalyst
      # client_id: ${CATALYST_OAUTH_CLIENT_ID}
      # client_secret: ${CATALYST_OAUTH_CLIENT_SECRET}
      scope: "mcp"
      # MUST exactly match the redirect URI registered in Catalyst's OAuth
      # client, and MUST use your real Render domain (NOT localhost):
      redirect_uri: "https://one-impact-ai.onrender.com/api/mcp/catalyst/oauth/callback"
      # Uncomment ONLY if you hit "invalid code verifier" errors (server lacks
      # full PKCE support):
      # skip_code_challenge_check: true
    # ---------------------------------------------------------------------------

# ----------------------------------------------------------------------------
# ENDPOINTS
# ----------------------------------------------------------------------------
# Also set in Render env:
#   ENDPOINTS=agents,anthropic
#   ANTHROPIC_API_KEY=sk-ant-...        (app-level key; shared by all users)
endpoints:
  # Agents drive BOTH MCP tool use (Catalyst) and Claude-style artifacts.
  # If startup fails on one of these capability names, remove the offending
  # one and restart — names can vary by version.
  agents:
    capabilities:
      - "tools"       # allows agents to call MCP tools (Catalyst)
      - "artifacts"   # Claude-style React / HTML / Mermaid rendering
      - "actions"
      - "chain"

  # Native Anthropic (Claude). Key comes from the ANTHROPIC_API_KEY env var.
  anthropic:
    streamRate: 25
    titleConvo: true
    titleModel: "current"   # auto-title using whatever model the chat uses
    # To restrict which Claude models appear, add a models: block here and
    # verify the current model IDs against Anthropic's documentation.